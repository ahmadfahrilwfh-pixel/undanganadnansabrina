<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Generator Link Undangan</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #D4AF37; display: flex; justify-content: center; align: center; height: 100vh; margin: 0; align-items: center; }
        .card { background: #1E1E1E; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); width: 100%; max-width: 400px; border: 1px solid #D4AF37; }
        h2 { text-align: center; margin-top: 0; }
        input, button, textarea { width: 100%; margin-bottom: 15px; padding: 12px; box-sizing: border-box; border-radius: 5px; border: 1px solid #D4AF37; background: #2A2A2A; color: white; }
        button { background: #D4AF37; color: #121212; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b5952f; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Buat Link Undangan</h2>
        <input type="text" id="namaTamu" placeholder="Nama Tamu (Cth: Ahmad Fahril)">
        <input type="text" id="alamatTamu" placeholder="Alamat/Instansi (Cth: Sukoharjo)">
        <button onclick="generateLink()">Generate Link</button>
        <textarea id="hasilLink" rows="4" readonly placeholder="Link akan muncul di sini..."></textarea>
        <button onclick="copyLink()" style="background: #2A2A2A; color: #D4AF37;">Copy Link</button>
    </div>

    <script>
        function generateLink() {
            let nama = document.getElementById('namaTamu').value.replace(/ /g, '_');
            let alamat = document.getElementById('alamatTamu').value.replace(/ /g, '_');
            let domain = "https://undangansabrina&adnan.web.id/";
            let link = `${domain}?to=${nama}%${alamat}`;
            document.getElementById('hasilLink').value = link;
        }

        function copyLink() {
            let copyText = document.getElementById("hasilLink");
            copyText.select();
            document.execCommand("copy");
            alert("Link berhasil disalin!");
        }
    </script>
</body>
</html>
